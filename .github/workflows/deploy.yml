name: Deploy Portfolio Site

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deployment environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - dev
      deploy_type:
        description: "What to deploy"
        required: true
        default: "app"
        type: choice
        options:
          - app
          - data

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required configuration
        run: |
          if [ -z "${{ secrets.AWS_ROLE_ARN }}" ]; then
            echo "Missing secret: AWS_ROLE_ARN"
            exit 1
          fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then
            echo "Missing variable: AWS_REGION"
            exit 1
          fi
          if [ -z "${{ vars.S3_BUCKET_NAME }}" ]; then
            echo "Missing variable: S3_BUCKET_NAME"
            exit 1
          fi
          if [ "${{ inputs.deploy_type }}" = "app" ]; then
            if [ -z "${{ vars.VITE_APP_ENV }}" ]; then
              echo "Missing variable: VITE_APP_ENV"
              exit 1
            fi
            if [ -z "${{ vars.VITE_RESUME_MODE }}" ]; then
              echo "Missing variable: VITE_RESUME_MODE"
              exit 1
            fi
            if [ -z "${{ vars.VITE_RESUME_API_URL }}" ]; then
              echo "Missing variable: VITE_RESUME_API_URL"
              exit 1
            fi
            if [ -z "${{ vars.VITE_RESUME_OBJECT_KEY }}" ]; then
              echo "Missing variable: VITE_RESUME_OBJECT_KEY"
              exit 1
            fi
            if [ -z "${{ vars.VITE_RESUME_EXPIRY_SECONDS }}" ]; then
              echo "Missing variable: VITE_RESUME_EXPIRY_SECONDS"
              exit 1
            fi
          fi

      - name: Write deployment metadata
        run: |
          mkdir -p site/public/data
          DEPLOYED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"

          cat > site/public/data/deployment.json <<EOF
          {
            "environment": "${{ inputs.target_environment }}",
            "deployedAt": "${DEPLOYED_AT}",
            "runId": "${GITHUB_RUN_ID}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "runAttempt": "${GITHUB_RUN_ATTEMPT}",
            "runUrl": "${RUN_URL}",
            "sha": "${GITHUB_SHA}",
            "shortSha": "${SHORT_SHA}",
            "commitUrl": "${COMMIT_URL}",
            "ref": "${GITHUB_REF_NAME}",
            "actor": "${GITHUB_ACTOR}",
            "deployType": "${{ inputs.deploy_type }}"
          }
          EOF

      - name: Set up Node.js
        if: ${{ inputs.deploy_type == 'app' }}
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        if: ${{ inputs.deploy_type == 'app' }}
        run: npm ci
        working-directory: site

      - name: Build
        if: ${{ inputs.deploy_type == 'app' }}
        env:
          VITE_APP_ENV: ${{ vars.VITE_APP_ENV }}
          VITE_RESUME_MODE: ${{ vars.VITE_RESUME_MODE }}
          VITE_RESUME_API_URL: ${{ vars.VITE_RESUME_API_URL }}
          VITE_RESUME_OBJECT_KEY: ${{ vars.VITE_RESUME_OBJECT_KEY }}
          VITE_RESUME_EXPIRY_SECONDS: ${{ vars.VITE_RESUME_EXPIRY_SECONDS }}
        run: npm run build
        working-directory: site

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy app (full build output)
        if: ${{ inputs.deploy_type == 'app' }}
        run: |
          # Static assets (JS, CSS, images) — Vite fingerprints these filenames,
          # so they are safe to cache for 1 year in browsers.
          aws s3 sync ./site/dist s3://${{ vars.S3_BUCKET_NAME }} --delete \
            --exclude "*.html" \
            --exclude "data/*" \
            --cache-control "public,max-age=31536000,immutable"

          # HTML files — entry points that reference fingerprinted assets,
          # must always be fetched fresh to avoid pointing to stale asset URLs.
          aws s3 sync ./site/dist s3://${{ vars.S3_BUCKET_NAME }} --delete \
            --exclude "*" --include "*.html" \
            --cache-control "public,max-age=0,must-revalidate"

          # Data files (JSON) — content changes independently of the app build,
          # so no caching to ensure the latest data is always served.
          aws s3 sync ./site/dist/data s3://${{ vars.S3_BUCKET_NAME }}/data --delete \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Deploy data only
        if: ${{ inputs.deploy_type == 'data' }}
        run: |
          aws s3 sync ./site/public/data s3://${{ vars.S3_BUCKET_NAME }}/data --delete \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront cache (app)
        if: ${{ inputs.deploy_type == 'app' && vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Invalidate CloudFront cache (data)
        if: ${{ inputs.deploy_type == 'data' && vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/data/*"

