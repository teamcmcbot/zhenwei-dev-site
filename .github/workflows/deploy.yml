name: Deploy Portfolio Site

on:
  workflow_dispatch:
    inputs:
      deploy_type:
        description: "What to deploy"
        required: true
        default: "app"
        type: choice
        options:
          - app
          - data

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "Missing secret: AWS_DEPLOY_ROLE_ARN"
            exit 1
          fi
          if [ -z "${{ vars.S3_BUCKET_NAME }}" ]; then
            echo "Missing repo variable: S3_BUCKET_NAME"
            exit 1
          fi

      - name: Set up Node.js
        if: ${{ inputs.deploy_type == 'app' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        if: ${{ inputs.deploy_type == 'app' }}
        run: npm ci
        working-directory: site

      - name: Build
        if: ${{ inputs.deploy_type == 'app' }}
        run: npm run build
        working-directory: site

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy app (full build output)
        if: ${{ inputs.deploy_type == 'app' }}
        run: |
          aws s3 sync ./site/dist s3://${{ vars.S3_BUCKET_NAME }} --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync ./site/dist s3://${{ vars.S3_BUCKET_NAME }} --delete \
            --exclude "*" --include "*.html" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Deploy data only
        if: ${{ inputs.deploy_type == 'data' }}
        run: |
          aws s3 sync ./site/public/data s3://${{ vars.S3_BUCKET_NAME }}/data --delete \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront cache (app)
        if: ${{ inputs.deploy_type == 'app' && vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Invalidate CloudFront cache (data)
        if: ${{ inputs.deploy_type == 'data' && vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/data/*"

