name: Deploy Portfolio Site

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ]; then
            echo "Missing secret: AWS_DEPLOY_ROLE_ARN"
            exit 1
          fi
          if [ -z "${{ vars.S3_BUCKET_NAME }}" ]; then
            echo "Missing repo variable: S3_BUCKET_NAME"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy static assets
        run: |
          aws s3 sync ./site s3://${{ vars.S3_BUCKET_NAME }} --delete --exclude "*.html" --cache-control "public,max-age=31536000,immutable"
          aws s3 sync ./site s3://${{ vars.S3_BUCKET_NAME }} --delete --exclude "*" --include "*.html" --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront cache
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
